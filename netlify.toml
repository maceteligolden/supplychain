# Netlify deployment — Traceability Platform POC (Next.js 16)
# If this repo’s root is above `supplychain/`, set Base directory to `supplychain` in Netlify UI.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  HUSKY = "0"
  NEXT_PUBLIC_USE_MOCK_API = "false"
  NEXT_PUBLIC_API_PROXY_TARGET = "https://supplychain-backend-wtgf.onrender.com"
  NEXT_PUBLIC_MOCK_DELAY_MS = "200"
  NEXT_PUBLIC_SESSION_COOKIE_NAME = "sc_session"
  NEXT_PUBLIC_SESSION_MAX_AGE_SECONDS = "86400"
  NEXT_PUBLIC_SESSION_SECRET = "traceability-poc-dev-secret-change-in-production"
  NEXT_PUBLIC_ACCESS_COOKIE_NAME = "sc_access"
  NEXT_PUBLIC_REFRESH_COOKIE_NAME = "sc_refresh"
  NEXT_PUBLIC_JWT_SECRET = "change-me-in-production"

[[plugins]]
  package = "@netlify/plugin-nextjs"
